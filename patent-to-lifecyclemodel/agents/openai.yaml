interface:
  display_name: "Patent to Lifecycle Model"
  short_description: "Convert a patent or SOP into a lifecyclemodel run and optional tiangong publish"
  default_prompt: "Use $patent-to-lifecyclemodel to author one plan.json from a patent/SOP, split it into defensible unit-operation processes, derive measured/calculated/estimated exchanges where possible, avoid black-box processes unless critical data are missing, run the driver, and publish through tiangong publish run only when explicitly requested."
