interface:
  display_name: "Patent to Lifecycle Model"
  short_description: "Convert a patent or SOP into a lifecyclemodel run with remote-flow reuse and tiangong publish"
  default_prompt: "Use $patent-to-lifecyclemodel to author one plan.json from a patent/SOP, split it into defensible unit-operation processes, derive measured/calculated/estimated exchanges where possible, resolve raw materials, utilities, elementary flows, and common reagents against remote database flow scope first with existing_flow_ref overrides for reviewed ambiguous matches, create new flows only for unresolved patent-specific intermediates/results, avoid black-box processes unless critical data are missing, run the driver, verify the primary reference process metadata, and publish generated flows plus the lifecyclemodel bundle through tiangong only when explicitly requested."
