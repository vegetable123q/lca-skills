interface:
  display_name: "Patent to Lifecycle Model"
  short_description: "Convert a patent or SOP into a lifecyclemodel run with mandatory remote-flow reuse and tiangong publish"
  default_prompt: "Use $patent-to-lifecyclemodel to author one plan.json from a patent/SOP, preserve patent source metadata such as company/assignee, priority/filing/publication/grant dates, best patent year, Google Patents URL, PDF URL, and family metadata for lifecyclemodel manifest basic_info, copy product-to-patent plan-source.json source objects directly when present, when starting from metadata CSV rows such as data/combined_patents_20250825_true.csv plus patent text use CSV columns for source/extra_metadata and patent text for technical LCI extraction, split it into defensible unit-operation processes, fill every review-required process field including key, step_id, name_en, name_zh when available, classification, scale, technology, comment, black_box, pure_oxygen, reference_output_flow, inputs, and outputs, put the LCI source text and technical parameters into processes[].technology so processInformation.technology.technologyDescriptionAndIncludedProcesses populates the UI 处理、标准、路线 field, derive measured/calculated/estimated exchanges where possible with source_ref/source_quote/calc_note/formula_ref as applicable, require remote database flow resolution before materialization, prefer product flows for process inputs, reject non-gas emission or elementary flows on inputs, allow elementary/basic input flows only for explicit gases, allow output/patent-to-lifecyclemodel-used-flows.json only as a minimal exact name plus exact unit direct-reuse cache for prior existing database flow hits, call the TianGong CLI with credentials from the current environment or tiangong-cli/.env whenever any flow is not directly cached or explicitly referenced, store the full remote scope only once at output/patent-to-lifecyclemodel-flow-scope.json, reject offline or frozen flow-scope fallbacks, resolve all flow candidates automatically by exactness, substance-specific nearest matching, state code, version, modified time, and id order, never collapse a specific metal input such as nickel, cobalt, or manganese to a bare generic Metal flow when a more specific compatible product flow exists, never reuse simple salt nearest matches that change the named counterion/cation such as sodium chloride to lithium chloride, never collapse patent-specific complex salts or solid electrolytes to broad compound rows such as Zirconium-based compound, create new flows only for unresolved patent-specific intermediates/results with no database match, avoid black-box processes unless critical data are missing, rerun corrected output from plan.json while preserving uuids.json before republishing incomplete records, run the driver with default lifecyclemodel validate-build data validation enabled and require the validation report ok:true before accepting output, verify lifecyclemodel json_tg uses localized process-name objects, unique process input/output ports, edge source/target ports for connected intermediate flows, and the native TIDAS quantitativeReference reference process projected to the final-product node, require generated-flow publish reports to have zero failures before accepting database publish, and publish only used generated flows plus the lifecyclemodel bundle through tiangong when explicitly requested."
