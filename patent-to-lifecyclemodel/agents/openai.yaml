interface:
  display_name: "Patent to Lifecycle Model"
  short_description: "Convert a patent or SOP into a lifecyclemodel run with mandatory remote-flow reuse and tiangong publish"
  default_prompt: "Use $patent-to-lifecyclemodel to author one plan.json from a patent/SOP, preserve patent source metadata such as company/assignee, priority/filing/publication/grant dates, best patent year, Google Patents URL, PDF URL, and family metadata for lifecyclemodel manifest basic_info, copy product-to-patent plan-source.json source objects directly when present, split it into defensible unit-operation processes, derive measured/calculated/estimated exchanges where possible, require remote database flow resolution before materialization, prefer product flows for process inputs, reject non-gas emission or elementary flows on inputs, allow elementary/basic input flows only for explicit gases, allow output/patent-to-lifecyclemodel-used-flows.json only as a minimal exact name plus exact unit direct-reuse cache for prior existing database flow hits, call the TianGong CLI with credentials from the current environment or tiangong-cli/.env whenever any flow is not directly cached or explicitly referenced, store the full remote scope only once at output/patent-to-lifecyclemodel-flow-scope.json, reject offline or frozen flow-scope fallbacks, resolve all flow candidates automatically by exactness, substance-specific nearest matching, state code, version, modified time, and id order, never collapse a specific metal input such as nickel, cobalt, or manganese to a bare generic Metal flow when a more specific compatible product flow exists, create new flows only for unresolved patent-specific intermediates/results with no database match, avoid black-box processes unless critical data are missing, run the driver, verify lifecyclemodel json_tg uses localized process-name objects, unique process input/output ports, edge source/target ports for connected intermediate flows, and the native TIDAS quantitativeReference reference process projected to the final-product node, and publish only used generated flows plus the lifecyclemodel bundle through tiangong when explicitly requested."
