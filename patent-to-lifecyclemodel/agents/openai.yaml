interface:
  display_name: "Patent to Lifecycle Model"
  short_description: "Convert a patent or SOP into a lifecyclemodel run with remote-flow reuse and tiangong publish"
  default_prompt: "Use $patent-to-lifecyclemodel to author one plan.json from a patent/SOP, preserve patent source metadata such as company/assignee, priority/publication/grant dates, and best patent year for lifecyclemodel manifest basic_info, split it into defensible unit-operation processes, derive measured/calculated/estimated exchanges where possible, require remote or reviewed flow scope before materialization, resolve unique exact database matches directly, inspect flow-resolution review candidates for raw materials, utilities, elementary flows, hydrate/valence variants, and common reagents, add existing_flow_ref plus audited canonical_flow_key/conversion_factor where appropriate, create new flows only for unresolved patent-specific intermediates/results, avoid black-box processes unless critical data are missing, run the driver, verify the primary reference process metadata, and publish generated flows plus the lifecyclemodel bundle through tiangong only when explicitly requested."
